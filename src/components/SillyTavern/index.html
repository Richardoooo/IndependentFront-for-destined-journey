<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SillyTavern Chat</title>
  <style>
    :root { --bg: #1a1a2e; --panel: #16213e; --text: #e0e0e0; --accent: #e94560; --border: #2a2a4a; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; }
    .sidebar { width: 260px; background: var(--panel); padding: 16px; display: flex; flex-direction: column; gap: 8px; border-right: 1px solid var(--border); }
    .sidebar button { width: 100%; padding: 10px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; border-radius: 6px; text-align: left; }
    .sidebar button:hover { background: rgba(255,255,255,0.05); }
    .main { flex: 1; display: flex; flex-direction: column; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; position: relative; }
    .message.user { align-self: flex-end; background: var(--accent); }
    .message.assistant { align-self: flex-start; background: var(--panel); }
    .msg-actions { margin-top: 6px; display: flex; gap: 8px; }
    .msg-actions button { font-size: 11px; padding: 3px 8px; background: rgba(255,255,255,0.1); border: none; color: #aaa; cursor: pointer; border-radius: 4px; }
    .input-bar { display: flex; gap: 8px; padding: 16px; border-top: 1px solid var(--border); }
    .input-bar input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel); color: var(--text); }
    .input-bar button { padding: 12px 24px; border: none; background: var(--accent); color: #fff; border-radius: 8px; cursor: pointer; }
    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--panel); border-radius: 12px; padding: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .modal h2 { margin-bottom: 16px; }
    .modal label { display: block; margin: 8px 0 4px; font-size: 13px; color: #999; }
    .modal input, .modal select, .modal textarea { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); margin-bottom: 10px; }
    .modal button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; }
    .modal .btn-primary { background: var(--accent); color: #fff; }
    .modal .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); margin-left: 8px; }
    .variable-list { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .variable-tag { background: rgba(233,69,96,0.2); color: var(--accent); padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    .chat-list-item { padding: 8px; border-radius: 6px; cursor: pointer; }
    .chat-list-item:hover, .chat-list-item.active { background: rgba(255,255,255,0.05); }
  </style>
</head>
<body>

<div class="sidebar">
  <h3 style="margin-bottom:8px">SillyTavern</h3>
  <div id="chat-list"></div>
  <button onclick="createChat()">+ 新建对话</button>
  <hr style="border-color:var(--border);margin:8px 0">
  <button onclick="openModal('settings-modal')">⚙ 设置</button>
  <button onclick="openModal('lorebook-modal')">📖 世界书</button>
  <button onclick="openModal('preset-modal')">🎛 预设</button>
  <button onclick="toggleVariables()">📊 变量 <span id="var-count"></span></button>
  <div id="variable-list" class="variable-list" style="display:none"></div>
</div>

<div class="main">
  <div id="messages" class="messages"></div>
  <div class="input-bar">
    <input id="user-input" placeholder="输入消息..." onkeydown="if(event.key==='Enter')send()" />
    <button onclick="send()" id="send-btn">发送</button>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>设置</h2>
    <label>API 地址</label>
    <input id="s-api-url" value="https://api.openai.com/v1" />
    <label>API Key</label>
    <input id="s-api-key" type="password" />
    <label>模型</label>
    <input id="s-model" value="gpt-3.5-turbo" />
    <label>你的名字</label>
    <input id="s-user-name" value="用户" />
    <label>角色名</label>
    <input id="s-char-name" value="AI" />
    <button class="btn-primary" onclick="saveSettings()">保存</button>
    <button class="btn-secondary" onclick="closeModal('settings-modal')">取消</button>
  </div>
</div>

<!-- Lorebook Modal -->
<div class="modal-overlay" id="lorebook-modal">
  <div class="modal">
    <h2>世界书</h2>
    <div id="lorebook-list"></div>
    <button class="btn-primary" onclick="importLorebook()">导入 JSON</button>
    <input type="file" id="lorebook-file" accept=".json" style="display:none" onchange="handleLorebookImport(event)" />
    <button class="btn-secondary" onclick="closeModal('lorebook-modal')">关闭</button>
  </div>
</div>

<!-- Preset Modal -->
<div class="modal-overlay" id="preset-modal">
  <div class="modal">
    <h2>预设</h2>
    <label>主提示词</label>
    <textarea id="p-main-prompt" rows="3">Write {{char}}'s next reply in a fictional chat between {{char}} and {{user}}.</textarea>
    <label>Temperature</label>
    <input id="p-temp" type="number" step="0.1" min="0" max="2" value="0.8" />
    <label>Max Tokens</label>
    <input id="p-max-tokens" type="number" value="2048" />
    <button class="btn-primary" onclick="savePreset()">保存</button>
    <button class="btn-secondary" onclick="closeModal('preset-modal')">取消</button>
  </div>
</div>

<script type="module">
// This file would normally import from the TypeScript sources via a bundler.
// For direct browser usage, see the SillyTavern integration in app.js
console.log('SillyTavern Web Automator v2 — Vanilla demo loaded');
</script>

</body>
</html>
